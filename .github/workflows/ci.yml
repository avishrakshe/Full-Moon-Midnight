name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    name: Build & Run Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mn-demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'mn-demo/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Verify managed ZK contract assets present
        run: |
          mkdir -p contracts/managed/hello-world
          ls -la contracts/managed/hello-world

      - name: Run Level 3 Unit Tests (Circuit Logic, State Transitions, Privacy)
        run: npm test

      - name: Build Web Application
        run: npm run build
